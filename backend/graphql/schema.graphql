"""
AssetForge GraphQL Schema
Cursor-based pagination follows the Relay Connection spec.
"""

type Query {
  """Fetch a single asset by ID."""
  asset(id: ID!): Asset

  """List assets with cursor-based pagination (max 100 per page)."""
  assets(first: Int, after: String, last: Int, before: String, status: String): AssetConnection!

  """Fetch a user's public profile."""
  userProfile(id: ID!): UserProfile

  """Platform analytics summary."""
  analyticsSummary: AnalyticsSummary
}

"""Relay-style connection for Asset pagination."""
type AssetConnection {
  edges: [AssetEdge!]!
  pageInfo: PageInfo!
  totalCount: Int!
}

type AssetEdge {
  node: Asset!
  cursor: String!
}

"""Cursor-based page info."""
type PageInfo {
  hasNextPage: Boolean!
  hasPreviousPage: Boolean!
  startCursor: String
  endCursor: String
}

type Asset {
  id: ID!
  name: String!
  symbol: String!
  assetType: String!
  status: String!
  totalSupply: String!
  createdAt: String!
}

type UserProfile {
  id: ID!
  username: String!
  stellarAddress: String!
  createdAt: String!
}

type AnalyticsSummary {
  totalUsers: Int!
  totalAssets: Int!
  activeListings: Int!
  reportGeneratedAt: String!
}
